<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>காலாவதியான இணைப்பு</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Tamil', sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; background:#f8fafc; margin:0; }
        .box { text-align:center; padding:40px; background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); max-width:400px; }
        .icon { font-size:48px; margin-bottom:16px; }
        h2 { color:#b91c1c; margin-bottom:8px; }
        p { color:#666; font-size:14px; }
    </style>
</head>
<body>
<div class="box">
    <div class="icon">⏰</div>
    <h2>இணைப்பு காலாவதியானது</h2>
    <p>இந்த வரன் விவர இணைப்பு 7 நாட்களுக்கு மட்டுமே செல்லுபடியாகும்.<br>
    மேலும் விவரங்களுக்கு செம்போடையார் வன்னியர் திருமண மையத்தை தொடர்பு கொள்ளவும்.</p>
</div>
</body>
</html>
